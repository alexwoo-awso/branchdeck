name: Release Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Container tag to publish
        required: true
        default: v0.1.0
      push_latest:
        description: Also publish latest
        required: true
        default: "true"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/branchdeck:${{ inputs.version }}
            ${{ inputs.push_latest == 'true' && format('ghcr.io/{0}/branchdeck:latest', github.repository_owner) || '' }}
          labels: |
            org.opencontainers.image.title=branchdeck
            org.opencontainers.image.description=Branch preview control plane built on netlify dev for Netlify-oriented projects
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
